name: 每日更新台股資料

on:
  schedule:
    - cron: '0 0 * * *'  # 每天 UTC 00:00 = 台灣時間 08:00
  workflow_dispatch:      # 允許手動觸發

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: 抓取 FinMind 資料
        env:
          FM_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: |
          python3 << 'EOF'
          import urllib.request
          import json
          import datetime
          import os

          TOKEN = os.environ['FM_TOKEN']
          BASE  = 'https://api.finmindtrade.com/api/v4/data'

          today = datetime.date.today()
          # 月營收：取近3個月確保能抓到資料
          this_month  = today.replace(day=1).strftime('%Y-%m-%d')
          last_month  = (today.replace(day=1) - datetime.timedelta(days=1)).replace(day=1).strftime('%Y-%m-%d')
          two_months_ago = (today.replace(day=1) - datetime.timedelta(days=32)).replace(day=1).strftime('%Y-%m-%d')
          rev_start = two_months_ago
          rev_end   = today.strftime('%Y-%m-%d')
          fin_start   = (today.replace(year=today.year-2)).strftime('%Y-%m-%d')  # 財報取近2年
          inst_start  = (today - datetime.timedelta(days=60)).strftime('%Y-%m-%d')

          def fm_get(dataset, extra=''):
            url = f'{BASE}?dataset={dataset}&token={TOKEN}{extra}'
            req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
            with urllib.request.urlopen(req, timeout=60) as r:
              data = json.loads(r.read())
            if data.get('status') != 200:
              raise Exception(f"{dataset} error: {data.get('msg')}")
            return data['data']

          result = {
            'updated_at': today.strftime('%Y-%m-%d %H:%M'),
            'this_month': this_month,
            'last_month': last_month,
          }

          # 1. 月營收（近3個月，取最新有資料的月份）
          print('抓取月營收...')
          try:
            rev_all = fm_get('TaiwanStockMonthRevenue', f'&start_date={rev_start}&end_date={rev_end}')
            print(f'  月營收原始筆數: {len(rev_all)}')
            # 找出最新月份
            if rev_all:
              dates = sorted(set(r['date'] for r in rev_all), reverse=True)
              print(f'  可用月份: {dates[:3]}')
              latest_date = dates[0]
              prev_date   = dates[1] if len(dates) > 1 else None
              rev_this = [r for r in rev_all if r['date'] == latest_date]
              rev_last = [r for r in rev_all if r['date'] == prev_date] if prev_date else []
              result['this_month']    = latest_date
              result['last_month']    = prev_date or ''
              result['revenue_this']  = rev_this
              result['revenue_last']  = rev_last
              print(f'  最新月({latest_date}): {len(rev_this)} 筆')
              print(f'  上月({prev_date}): {len(rev_last)} 筆')
            else:
              result['revenue_this'] = []
              result['revenue_last'] = []
          except Exception as e:
            print(f'  月營收失敗: {e}')
            result['revenue_this'] = []
            result['revenue_last'] = []

          # 3. 股票基本資料（產業分類）
          print('抓取股票產業資料...')
          try:
            info = fm_get('TaiwanStockInfo')
            # 只保留上市上櫃
            info = [r for r in info if r.get('type') in ('twse','tpex')]
            result['stock_info'] = info
            print(f'  股票數: {len(info)}')
          except Exception as e:
            print(f'  失敗: {e}')
            result['stock_info'] = []

          # 4. 三大法人（近60日，全市場彙總）
          print('抓取三大法人資料...')
          try:
            inst = fm_get('TaiwanInstitutionalInvestorsBuySell', f'&start_date={inst_start}&end_date={today.strftime("%Y-%m-%d")}')
            result['institutional'] = inst
            print(f'  法人資料: {len(inst)} 筆')
          except Exception as e:
            print(f'  失敗: {e}')
            result['institutional'] = []

          # 5. 財報損益表（近2年，全市場）
          print('抓取財報損益表...')
          try:
            fin = fm_get('TaiwanStockFinancialStatements', f'&start_date={fin_start}&end_date={today.strftime("%Y-%m-%d")}')
            result['financial'] = fin
            print(f'  財報資料: {len(fin)} 筆')
          except Exception as e:
            print(f'  失敗: {e}')
            result['financial'] = []

          # 寫入 data.json
          with open('data.json', 'w', encoding='utf-8') as f:
            json.dump(result, f, ensure_ascii=False, separators=(',', ':'))

          print(f'\n✅ data.json 寫入完成')
          print(f'   月營收(本月): {len(result["revenue_this"])} 筆')
          print(f'   月營收(上月): {len(result["revenue_last"])} 筆')
          print(f'   股票資料: {len(result["stock_info"])} 筆')
          print(f'   法人資料: {len(result["institutional"])} 筆')
          print(f'   財報資料: {len(result["financial"])} 筆')
          EOF

      - name: 推回 repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "📊 每日資料更新 $(date +'%Y-%m-%d')"
          git push
